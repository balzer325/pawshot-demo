<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PawShot — Captura. Rescata. Adopta.</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<style>
  :root{
    --bg:#f3f1ef;
    --ink:#111111;
    --ink-2:#2b2b2b;
    --muted:#7a7a7a;
    --line:#e6e3df;
    --soft:#f7f5f2;
    --white:#ffffff;
    --accent:#111111;
    --mustard:#e3b35b;
    --green:#2fa56a;
    --red:#e0463a;
    --yellow:#f4b94b;
    --purple:#7c4dff;
    --blue:#3777e3;
    --orange:#f08a3e;
    --shadow:0 30px 60px rgba(0,0,0,.18), 0 8px 18px rgba(0,0,0,.08);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);font-family:'Segoe UI','Helvetica Neue',Arial,sans-serif;color:var(--ink);min-height:100%}
  body{display:flex;align-items:center;justify-content:center;padding:24px;min-height:100vh}

  /* ================= Layout ================ */
  .stage{display:flex;gap:32px;align-items:center;justify-content:center;width:100%;max-width:1200px;flex-wrap:wrap}

  /* Phone frame */
  .phone-wrap{position:relative}
  .phone{
    width:380px;height:780px;background:#000;border-radius:46px;padding:14px;box-shadow:var(--shadow);
    position:relative;
  }
  .phone:before{
    content:"";position:absolute;top:14px;left:50%;transform:translateX(-50%);
    width:120px;height:24px;background:#000;border-radius:0 0 18px 18px;z-index:5;
  }
  .screen{
    width:100%;height:100%;background:var(--white);border-radius:34px;overflow:hidden;position:relative;
    display:flex;flex-direction:column;
  }
  .status-bar{
    height:34px;display:flex;align-items:center;justify-content:space-between;
    padding:8px 22px 0;font-size:12px;font-weight:600;color:#111;
  }
  .status-bar .right{display:flex;gap:6px;align-items:center}
  .view{flex:1;overflow-y:auto;overflow-x:hidden;position:relative;background:var(--white)}
  .view::-webkit-scrollbar{width:0}
  .view.dark{background:#0e0e0e;color:#fff}
  .bottom-nav{
    height:64px;background:#fff;border-top:1px solid var(--line);
    display:grid;grid-template-columns:repeat(5,1fr);align-items:center;justify-items:center;
    padding-bottom:6px;
  }
  .bottom-nav button{
    background:none;border:0;display:flex;flex-direction:column;align-items:center;gap:2px;
    font-size:10.5px;color:#9c9c9c;cursor:pointer;padding:6px 4px;font-family:inherit;
  }
  .bottom-nav button .ic{font-size:18px;line-height:1}
  .bottom-nav button.active{color:var(--ink);font-weight:600}
  .bottom-nav button.active .ic{transform:scale(1.1)}

  /* ================ Common UI ============== */
  .pad{padding:18px 22px}
  .center{text-align:center}
  h2.title{font-size:22px;margin:8px 0 4px;letter-spacing:-.4px}
  h3.section{font-size:13px;letter-spacing:1.2px;color:#222;margin:18px 0 8px;font-weight:700;text-transform:uppercase}
  p.sub{color:var(--muted);font-size:13.5px;margin:4px 0 12px;line-height:1.5}
  .top-app-bar{
    display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--line);
    background:#fff;position:sticky;top:0;z-index:4;
  }
  .top-app-bar .left{display:flex;align-items:center;gap:10px;font-weight:700;font-size:17px}
  .top-app-bar .left .back{
    background:none;border:0;font-size:20px;cursor:pointer;color:#111;padding:0;line-height:1;
  }
  .top-app-bar .right{display:flex;gap:14px;align-items:center;color:#111}
  .top-app-bar .right .icon-btn{background:none;border:0;cursor:pointer;font-size:18px;color:#111;font-family:inherit}

  .input,.select,.textarea{
    width:100%;background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 14px;
    font-size:14px;outline:none;color:#111;font-family:inherit;
  }
  .input:focus,.select:focus,.textarea:focus{border-color:#111}
  .textarea{min-height:80px;resize:vertical}
  .label{font-size:11px;letter-spacing:1px;color:#222;font-weight:700;margin:14px 0 6px;text-transform:uppercase}
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    background:#111;color:#fff;border:0;border-radius:999px;padding:14px 18px;width:100%;
    font-size:14.5px;font-weight:600;cursor:pointer;letter-spacing:.2px;font-family:inherit;
  }
  .btn:active{transform:translateY(1px)}
  .btn.ghost{background:#fff;color:#111;border:1px solid var(--line)}
  .btn.dark{background:#111;color:#fff}
  .btn.small{padding:9px 14px;font-size:12.5px;width:auto}
  .btn.danger{background:#e0463a}
  .btn[disabled]{opacity:.45;cursor:not-allowed}

  .chip{
    display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border-radius:999px;font-size:12px;
    background:#f1efeb;color:#222;border:1px solid transparent;cursor:pointer;font-weight:500;
  }
  .chip.active{background:#111;color:#fff}
  .chip.dot-r{background:#fde7e4;color:#a52a1d}
  .chip.dot-g{background:#defaee;color:#147346}
  .chip.dot-y{background:#fff4d6;color:#8a5a00}
  .chip.dot-b{background:#e7eefa;color:#1d4a8c}

  .card{
    background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px;display:flex;gap:12px;align-items:center;
  }
  .card .avatar{
    width:54px;height:54px;border-radius:14px;background:#f1efeb;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;
  }
  .card .meta{flex:1;min-width:0}
  .card .meta .t{font-weight:700;font-size:14.5px;margin:0}
  .card .meta .s{color:var(--muted);font-size:12.5px;margin:2px 0 0}
  .badge{
    font-size:11px;padding:5px 9px;border-radius:999px;font-weight:600;letter-spacing:.2px;white-space:nowrap;
  }
  .badge.warn{background:#fff4d6;color:#8a5a00}
  .badge.ok{background:#defaee;color:#147346}
  .badge.no{background:#fde7e4;color:#a52a1d}
  .badge.info{background:#e7eefa;color:#1d4a8c}
  .badge.new{background:#111;color:#fff}

  .row-link{
    display:flex;align-items:center;justify-content:space-between;padding:14px 4px;border-bottom:1px solid var(--line);
    cursor:pointer;
  }
  .row-link:last-child{border-bottom:0}
  .row-link .lt{display:flex;gap:12px;align-items:center;font-size:14px}
  .row-link .lt .ic{width:30px;height:30px;border-radius:10px;background:#f3f1ee;display:flex;align-items:center;justify-content:center;font-size:14px}
  .row-link .rt{color:#aaa}

  .tabs{display:flex;border-bottom:1px solid var(--line);margin-bottom:10px}
  .tabs button{
    flex:1;background:none;border:0;padding:11px 8px;font-size:13px;color:#888;font-weight:600;cursor:pointer;
    border-bottom:2px solid transparent;font-family:inherit;
  }
  .tabs button.active{color:#111;border-color:#111}

  .stepbar{display:flex;align-items:center;justify-content:center;gap:6px;margin:10px 0 16px}
  .stepbar .step{width:28px;height:28px;border-radius:50%;background:#eee;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#aaa}
  .stepbar .step.on{background:#111;color:#fff}
  .stepbar .line{flex:0 0 28px;height:1.5px;background:#eee;border-radius:2px}
  .stepbar .line.on{background:#111}

  .upload{
    border:1.5px dashed #d6d3ce;border-radius:16px;background:#faf8f5;min-height:160px;display:flex;flex-direction:column;
    align-items:center;justify-content:center;color:#777;font-size:13px;gap:6px;cursor:pointer;padding:12px;
  }
  .upload .ic{font-size:26px}
  .upload.has-files{flex-direction:row;flex-wrap:wrap;justify-content:flex-start;align-items:flex-start;background:#fff;border-style:solid;border-color:var(--line);gap:8px}
  .upload .preview{position:relative;width:88px;height:88px;border-radius:10px;overflow:hidden;border:1px solid var(--line);background:#f3f1ee}
  .upload .preview img,.upload .preview video{width:100%;height:100%;object-fit:cover;display:block}
  .upload .preview .rm{
    position:absolute;top:4px;right:4px;background:rgba(0,0,0,.7);color:#fff;border:0;border-radius:50%;
    width:20px;height:20px;font-size:12px;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;
  }
  .upload .add-more{
    width:88px;height:88px;border:1.5px dashed #d6d3ce;border-radius:10px;display:flex;align-items:center;justify-content:center;
    color:#aaa;font-size:28px;cursor:pointer;background:#faf8f5;
  }
  .upload .add-more:hover{border-color:#111;color:#111}

  .toast{
    position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#111;color:#fff;
    padding:12px 18px;border-radius:999px;font-size:13px;box-shadow:var(--shadow);z-index:99;opacity:0;pointer-events:none;
    transition:opacity .25s ease,transform .25s ease;
  }
  .toast.show{opacity:1;transform:translate(-50%,-6px)}

  /* ============== Login (Entry) ============== */
  .login-bg{
    height:100%;background:linear-gradient(180deg,#0e0e0e 0%,#1c1c1c 38%,#fff 38%,#fff 100%);
    display:flex;flex-direction:column;
  }
  .login-top{padding:42px 22px 22px;color:#fff;text-align:center}
  .login-top .logo{
    width:64px;height:64px;border-radius:50%;background:#1f1f1f;display:flex;align-items:center;justify-content:center;
    font-size:30px;margin:0 auto 8px;border:1px solid #2f2f2f;
  }
  .login-top h1{font-size:26px;margin:6px 0 4px;letter-spacing:-.5px}
  .login-top .tag{color:#bdbdbd;font-size:12.5px;margin-bottom:10px}
  .login-card{
    background:#fff;border-radius:24px 24px 0 0;padding:22px;flex:1;
    box-shadow:0 -10px 30px rgba(0,0,0,.15);overflow-y:auto;
  }
  .login-card h3{margin:0 0 4px;font-size:16px}
  .login-card .muted{color:var(--muted);font-size:12.5px;margin-bottom:14px}

  .demo-user{
    display:flex;align-items:center;gap:12px;background:#fafaf8;border:1px solid var(--line);
    border-radius:14px;padding:11px 14px;margin-bottom:8px;cursor:pointer;transition:all .15s;
  }
  .demo-user:hover{border-color:#111;background:#fff}
  .demo-user .av{width:38px;height:38px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:17px;border:1px solid var(--line)}
  .demo-user .info{flex:1;min-width:0}
  .demo-user .name{font-weight:700;font-size:13.5px}
  .demo-user .role{font-size:11.5px;color:var(--muted)}
  .demo-user .go{color:#111;font-weight:700;font-size:14px}

  .divider{display:flex;align-items:center;gap:10px;color:#aaa;font-size:11px;margin:14px 0}
  .divider:before,.divider:after{content:"";flex:1;height:1px;background:#e6e3df}

  /* ============== Map ============== */
  .map{
    position:relative;height:420px;background:#e4eadf;
    overflow:hidden;border-bottom:1px solid var(--line);
  }
  #leafletMap{width:100%;height:100%;z-index:1}
  .leaflet-container{font-family:inherit;background:#dde5d3}
  .leaflet-control-zoom{margin:78px 14px 0 0 !important;border:0 !important;border-radius:12px !important;overflow:hidden;box-shadow:0 8px 20px rgba(0,0,0,.12)}
  .leaflet-control-zoom a{background:#fff;color:#111;width:36px !important;height:36px !important;line-height:36px !important;font-size:18px;border:0 !important}
  .leaflet-control-attribution{font-size:9px;background:rgba(255,255,255,.7) !important}
  .dog-marker, .hazard-marker, .vet-marker{
    width:38px;height:38px;border-radius:50%;background:#fff;border:3px solid #fff;
    display:flex;align-items:center;justify-content:center;font-size:16px;
    box-shadow:0 4px 10px rgba(0,0,0,.3);
  }
  .dog-marker.r{background:#fde7e4;color:#a52a1d}
  .dog-marker.g{background:#defaee;color:#147346}
  .dog-marker.b{background:#e7eefa;color:#1d4a8c}
  .hazard-marker{background:#fff4d6;color:#8a5a00;animation:pulse 2s ease-in-out infinite}
  .hazard-marker.crit{background:#fde7e4;color:#a52a1d}
  .vet-marker{background:#ede4ff;color:#5a32cc}
  .leaflet-popup-content-wrapper{border-radius:14px;box-shadow:0 8px 22px rgba(0,0,0,.18)}
  .leaflet-popup-content{margin:10px 14px;font-size:12.5px;font-family:inherit}
  .leaflet-popup-content b{display:block;font-size:13.5px;margin-bottom:2px}
  .leaflet-popup-content .open-btn{display:inline-block;margin-top:6px;background:#111;color:#fff;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:600;cursor:pointer}
  .map-recenter{
    position:absolute;right:14px;bottom:84px;width:42px;height:42px;border-radius:50%;background:#fff;
    display:flex;align-items:center;justify-content:center;font-size:16px;border:0;cursor:pointer;
    box-shadow:0 8px 20px rgba(0,0,0,.12);z-index:3;font-family:inherit;
  }
  .map .park{position:absolute;background:#c8d6a5;border-radius:8px;opacity:.7}
  .map .park-label{position:absolute;font-size:9.5px;color:#3d5a1e;font-weight:700;letter-spacing:.5px;text-transform:uppercase;pointer-events:none}
  .map .street{position:absolute;background:#fff;box-shadow:inset 0 0 0 1px #e3dfd5}
  .map .street-name{
    position:absolute;font-size:9px;color:#777;font-weight:600;background:rgba(255,255,255,.7);padding:1px 4px;border-radius:3px;pointer-events:none;
  }
  .map .district-label{
    position:absolute;top:14px;right:14px;background:rgba(255,255,255,.95);border:1px solid var(--line);
    padding:6px 10px;border-radius:10px;font-size:11px;color:#444;font-weight:600;z-index:3;pointer-events:none;
  }
  .map .pin{
    position:absolute;width:34px;height:34px;border-radius:50%;background:#fff;border:3px solid #fff;
    display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 4px 10px rgba(0,0,0,.22);
    cursor:pointer;transform:translate(-50%,-100%);transition:transform .15s;
  }
  .map .pin:hover{transform:translate(-50%,-100%) scale(1.1);z-index:5}
  .map .pin.r{background:#fde7e4;color:#a52a1d}
  .map .pin.g{background:#defaee;color:#147346}
  .map .pin.b{background:#e7eefa;color:#1d4a8c}
  .map .pin.shop{background:#ede4ff;color:#5a32cc}
  .map .pin.hazard{background:#fff4d6;color:#8a5a00;animation:pulse 2s ease-in-out infinite}
  .map .pin.hazard.crit{background:#fde7e4;color:#a52a1d}
  @keyframes pulse {
    0%,100%{box-shadow:0 4px 10px rgba(0,0,0,.22)}
    50%{box-shadow:0 0 0 6px rgba(240,138,62,.25),0 4px 10px rgba(0,0,0,.22)}
  }
  .map .pin .label{
    position:absolute;top:-32px;left:50%;transform:translateX(-50%);
    background:#111;color:#fff;font-size:10.5px;padding:5px 8px;border-radius:8px;white-space:nowrap;font-weight:600;
    pointer-events:none;opacity:0;transition:opacity .15s;z-index:6;
  }
  .map .pin:hover .label{opacity:1}
  .map .pin .label:after{
    content:"";position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);border:4px solid transparent;border-top-color:#111;
  }
  .map-toolbar{
    position:absolute;left:14px;right:14px;top:14px;display:flex;gap:10px;align-items:center;z-index:3;
  }
  .map-toolbar .search{
    flex:1;background:#fff;border-radius:999px;padding:11px 16px;display:flex;align-items:center;gap:8px;font-size:13px;color:#666;
    box-shadow:0 8px 20px rgba(0,0,0,.08);
  }
  .map-toolbar .ibtn{
    width:42px;height:42px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;
    box-shadow:0 8px 20px rgba(0,0,0,.08);border:0;cursor:pointer;font-family:inherit;
  }
  .map-chips{
    position:absolute;top:70px;left:14px;right:14px;display:flex;gap:6px;overflow-x:auto;z-index:3;
  }
  .map-chips::-webkit-scrollbar{display:none}
  .map-chips .chip{
    background:rgba(255,255,255,.95);box-shadow:0 4px 10px rgba(0,0,0,.08);border:1px solid var(--line);
    white-space:nowrap;
  }
  .map-chips .chip.active{background:#111;color:#fff;border-color:#111}
  .fab{
    position:absolute;right:18px;bottom:18px;width:54px;height:54px;border-radius:50%;background:#111;color:#fff;
    display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;box-shadow:0 12px 24px rgba(0,0,0,.25);
    border:0;font-family:inherit;
  }
  .fab-label{
    position:absolute;right:80px;bottom:30px;background:#111;color:#fff;padding:6px 12px;border-radius:999px;font-size:11.5px;font-weight:600;
    box-shadow:0 8px 18px rgba(0,0,0,.2);pointer-events:none;
  }
  .map-legend{
    display:flex;gap:10px;justify-content:center;padding:10px 12px;border-bottom:1px solid var(--line);font-size:11px;color:#444;flex-wrap:wrap;
  }
  .map-legend span{display:flex;align-items:center;gap:5px}
  .map-legend .d{width:10px;height:10px;border-radius:50%}

  .quick-actions{
    display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 18px 4px;
  }
  .quick-actions .qa{
    background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px;cursor:pointer;
    display:flex;align-items:center;gap:10px;
  }
  .quick-actions .qa .ic{width:36px;height:36px;border-radius:12px;background:#f3f1ee;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
  .quick-actions .qa.tips .ic{background:#defaee;color:#147346}
  .quick-actions .qa.hazards .ic{background:#fff4d6;color:#8a5a00}
  .quick-actions .qa .t{font-weight:700;font-size:13px;margin:0}
  .quick-actions .qa .s{font-size:11px;color:var(--muted);margin:2px 0 0}

  /* Dog illustration */
  .dog-art{
    height:170px;background:#f5f3ef;display:flex;align-items:center;justify-content:center;font-size:90px;
  }

  /* PawPoints */
  .points-hero{
    margin:10px 18px;background:#101010;color:#fff;border-radius:22px;padding:22px;display:flex;flex-direction:column;align-items:center;gap:8px;
  }
  .points-hero .num{font-size:38px;font-weight:700;letter-spacing:-1px}
  .points-hero .lvl{background:#1f1f1f;padding:6px 12px;border-radius:999px;font-size:12px;color:#f4c46b;font-weight:600}
  .progress{height:6px;background:#f1efeb;border-radius:6px;overflow:hidden;margin:8px 0}
  .progress > div{height:100%;background:#111;border-radius:6px}
  .promo{
    background:linear-gradient(135deg,#fff7e3,#ffeec2);border:1px solid #f0d699;border-radius:16px;padding:14px;
    display:flex;gap:10px;align-items:center;
  }
  .promo .ic{font-size:20px}
  .promo .t{font-weight:700;font-size:13.5px}
  .promo .s{font-size:11.5px;color:#7a5a17}
  .promo button{
    background:#111;color:#fff;border:0;border-radius:999px;padding:8px 12px;font-size:11.5px;font-weight:600;cursor:pointer;font-family:inherit;
  }

  /* Chat */
  .chat-msgs{padding:14px;display:flex;flex-direction:column;gap:10px}
  .bubble{padding:10px 13px;border-radius:14px;font-size:13.2px;max-width:78%;line-height:1.45;position:relative;color:#111}
  .bubble.in{background:#f1efeb;border-bottom-left-radius:4px;align-self:flex-start}
  .bubble.out{background:#111;color:#fff;border-bottom-right-radius:4px;align-self:flex-end}
  .bubble .ts{display:block;font-size:10px;color:rgba(0,0,0,.5);margin-top:4px}
  .bubble.out .ts{color:rgba(255,255,255,.55)}
  .chat-bar{
    display:flex;gap:8px;padding:10px 14px;border-top:1px solid var(--line);background:#fff;
  }
  .chat-bar input{flex:1;border:1px solid var(--line);border-radius:999px;padding:10px 14px;font-size:13.5px;outline:none;font-family:inherit}
  .chat-bar button{background:#111;color:#fff;border:0;border-radius:50%;width:38px;height:38px;cursor:pointer;font-size:16px;font-family:inherit}
  .chat-context{background:#f7f5f2;padding:10px 14px;font-size:12px;color:#444;border-bottom:1px solid var(--line)}

  /* Notifications */
  .notif-item{
    display:flex;gap:12px;padding:14px 0;border-bottom:1px solid var(--line);align-items:flex-start;
  }
  .notif-item .ic{
    width:34px;height:34px;border-radius:50%;background:#f3f1ee;display:flex;align-items:center;justify-content:center;font-size:14px;
    flex-shrink:0;

const emailKey = (e) => e.toLowerCase().replace(/[.$#\[\]\/]/g, "_");

/* ---- Store (Firebase con fallback a localStorage) ---- */
const store = {
  async findUser(email){
    if(fbReady){
      const snap = await fbDB.ref("users/" + emailKey(email)).once("value");
      return snap.val();
    }
    return state.users.find(u => u.email === email.toLowerCase()) || null;
  },
  async createUser(user){
    user.email = user.email.toLowerCase();
    user.createdAt = Date.now();
    if(fbReady){
      await fbDB.ref("users/" + emailKey(user.email)).set(user);
    }
    if(!state.users.find(u=>u.email===user.email)) state.users.push(user);
    saveState();
    return user;
  },
  async updateUser(email, patch){
    if(fbReady){
      await fbDB.ref("users/" + emailKey(email)).update(patch);
    }
    const u = state.users.find(u=>u.email===email);
    if(u) Object.assign(u, patch);
    saveState();
  },
  async addDog(dog){
    dog.createdAt = Date.now();
    if(fbReady){
      const ref = fbDB.ref("dogs").push();
      dog.id = ref.key;
      await ref.set(dog);
    } else {
      dog.id = "d" + Date.now();
      DOGS.unshift(dog);
    }
    return dog;
  },
  async addHazard(h){
    h.createdAt = Date.now();
    if(fbReady){
      const ref = fbDB.ref("hazards").push();
      h.id = ref.key;
      await ref.set(h);
    } else {
      h.id = "h" + Date.now();
      HAZARDS.unshift(h);
    }
    return h;
  },
  async confirmHazard(id){
    if(fbReady){
      const ref = fbDB.ref("hazards/" + id + "/confirmed");
      await ref.transaction(v => (v || 0) + 1);
    } else {
      const h = HAZARDS.find(x=>x.id===id);
      if(h) h.confirmed = (h.confirmed||0) + 1;
    }
  },
};

/* ---- Live sync de DOGS y HAZARDS ---- */
function fillCoords(item){
  if(item.lat && item.lng) return item;
  const c = DISTRICT_COORDS[item.district] || DISTRICT_COORDS["Lima"];
  const j = () => (Math.random()-0.5) * 0.012;
  return { ...item, lat: c[0]+j(), lng: c[1]+j() };
}
function setupLiveSync(){
  if(!fbReady) return;
  fbDB.ref("dogs").on("value", snap => {
    const v = snap.val();
    if(v) DOGS = Object.values(v).map(fillCoords).sort((a,b) => (b.createdAt||0) - (a.createdAt||0));
    const cur = state.current?.screen;
    if(cur === "map" || cur === "dogDetail") renderScreen(cur, state.current.params || {});
  });
  fbDB.ref("hazards").on("value", snap => {
    const v = snap.val();
    if(v) HAZARDS = Object.values(v).map(fillCoords).sort((a,b) => (b.createdAt||0) - (a.createdAt||0));
    const cur = state.current?.screen;
    if(cur === "map" || cur === "hazards") renderScreen(cur, state.current.params || {});
  });
}

/* ----------------- File uploader ----------------- */
function attachUploader(selector, opts={}){
  const el = typeof selector === "string" ? $(selector) : selector;
  if(!el) return null;
  const { multiple=true, max=5, accept="image/*,video/*", placeholder="<span class='ic'>📷</span>Toca para agregar fotos" } = opts;
  let files = [];
  const input = document.createElement("input");
  input.type = "file"; input.accept = accept; input.multiple = multiple;
  input.style.display = "none";
  el.appendChild(input);
  const render = () => {
    if(files.length === 0){
      el.classList.remove("has-files");
      el.innerHTML = placeholder;
      el.appendChild(input);
      return;
    }
    el.classList.add("has-files");
    el.innerHTML = files.map((f,i)=>{
      const isVid = f.type && f.type.startsWith("video");
      return `<div class="preview">${isVid?`<video src="${f.data}" muted></video>`:`<img src="${f.data}" alt=""/>`}<button class="rm" data-i="${i}" type="button">×</button></div>`;
    }).join("") + (files.length < max ? `<div class="add-more" data-add="1">+</div>` : "");
    el.appendChild(input);
    $$(".rm", el).forEach(b => b.onclick = (e)=>{
      e.stopPropagation();
      files.splice(+b.dataset.i, 1);
      render();
    });
    const add = $("[data-add]", el);
    if(add) add.onclick = (e)=>{ e.stopPropagation(); input.click(); };
  };
  el.addEventListener("click", e => {
    if(e.target.closest(".rm") || e.target.closest("[data-add]")) return;
    input.click();
  });
  input.addEventListener("change", ()=>{
    const slots = Math.max(0, max - files.length);
    const list = [...input.files].slice(0, slots);
    Promise.all(list.map(f => new Promise(r => {
      const reader = new FileReader();
      reader.onload = e => r({ name: f.name, type: f.type, data: e.target.result });
      reader.readAsDataURL(f);
    }))).then(r => { files.push(...r); render(); input.value = ""; });
  });
  render();
  return { getFiles: ()=> files, clear: ()=>{ files = []; render(); } };
}
function go(screen, params={}, push=true){
  if(push) state.history.push({screen, params});
  state.current = {screen, params};
  saveState();
  closeSideMenu();
  renderScreen(screen, params);
}
function back(){
  if(state.history.length > 1){
    state.history.pop();
    const prev = state.history[state.history.length-1];
    state.current = prev;
    saveState();
    renderScreen(prev.screen, prev.params || {});
  } else {
    go(state.session ? "map" : "login");
  }
}
function logout(){
  state.session = null;
  state.history = [];
  saveState();
  go("login");
}
function currentUser(){ return state.session ? state.users.find(u=>u.email===state.session) : null; }
function updateUser(patch){

}

        <button class="ibtn" id="filtBtn">⚙️</button>
      </div>
      <div class="map-chips">
        <span class="chip active" data-f="all">Todo</span>
        <span class="chip dot-r" data-f="reported">🔴 Reportados</span>
        <span class="chip dot-g" data-f="follow">🟢 Seguimiento</span>

      <button class="fab" id="fab">${fabIcon}</button>
      <div class="fab-label">${fabTitle}</div>
    </div>

    <div class="map-legend">
      <span><span class="d" style="background:#a52a1d"></span>Reportado</span>
      <span><span class="d" style="background:#147346"></span>Seguimiento</span>
      <span><span class="d" style="background:#1d4a8c"></span>Adopción</span>
      <span><span class="d" style="background:#f08a3e"></span>Peligro</span>
      <span><span class="d" style="background:#7c4dff"></span>Aliado</span>
    </div>

    <div class="quick-actions">
      <div class="qa tips" id="qaTips"><div class="ic">💡</div><div><p class="t">Consejos</p><p class="s">Antes de acercarte</p></div></div>
      <div class="qa hazards" id="qaHaz"><div class="ic">⚠️</div><div><p class="t">Peligros</p><p class="s">${HAZARDS.length} alertas activas</p></div></div>
    </div>

    <div class="pad" style="padding-top:8px">
      <h3 class="section" style="margin-top:8px">Cerca de ti</h3>
      ${DOGS.slice(0,3).map(d=>`
        <div class="card mt8" data-id="${d.id}" style="cursor:pointer">
          <div class="avatar">${d.img}</div>
          <div class="meta">
            <p class="t">${d.name} · <span class="small">${d.district}</span></p>
            <p class="s">${d.status} · ${d.reportedAt}</p>
          </div>
          <span class="badge ${d.status==='Reportado'?'no':d.status==='En adopción'?'info':'warn'}">${d.status}</span>
        </div>`).join("")}
    </div>`;

  $("#menu").onclick = openSideMenu;
  $("#notifBtn").onclick = ()=> go("notif");
  $("#filtBtn").onclick = ()=> go("filters");
  $("#qaTips").onclick = ()=> go("tips");
  $("#qaHaz").onclick = ()=> go("hazards");

  /* ---- Mapa real de Perú con Leaflet/OpenStreetMap ---- */
  if(window._lmap){ try{ window._lmap.remove(); }catch(e){} window._lmap = null; }
  const lmap = L.map("leafletMap", { zoomControl:true, attributionControl:true })
    .setView(userCoords, 14);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom:19, attribution:"© OpenStreetMap",
  }).addTo(lmap);
  window._lmap = lmap;

  const renderMarkers = (filter="all")=>{
    (window._lmarkers||[]).forEach(m => lmap.removeLayer(m));
    window._lmarkers = [];
    const add = (mk)=>{ window._lmarkers.push(mk); mk.addTo(lmap); };

    // Perros
    if(filter==="all" || filter==="reported" || filter==="follow" || filter==="adoption"){
      DOGS.forEach(d => {
        if(!d.lat || !d.lng) return;
        if(filter==="reported" && d.status!=="Reportado") return;
        if(filter==="follow" && d.status!=="En seguimiento") return;
        if(filter==="adoption" && d.status!=="En adopción") return;
        const cls = d.status==="Reportado"?"r":d.status==="En seguimiento"?"g":"b";
        const ic = L.divIcon({
          className:"", html:`<div class="dog-marker ${cls}">${d.img||"🐕"}</div>`,
          iconSize:[38,38], iconAnchor:[19,38], popupAnchor:[0,-32],
        });
        const m = L.marker([d.lat, d.lng], { icon:ic });
        m.bindPopup(`<b>${d.name}</b>${d.location||d.district}<br/><span style="color:#888">${d.status}</span><br/><span class="open-btn" onclick="window._openDog('${d.id}')">Ver detalle</span>`);
        add(m);
      });
    }
    // Peligros
    if(filter==="all" || filter==="hazards"){
      HAZARDS.forEach(h => {
        if(!h.lat || !h.lng) return;
        const cls = h.sev==="crit"?"crit":"";
        const ic = L.divIcon({
          className:"", html:`<div class="hazard-marker ${cls}">${h.ic}</div>`,
          iconSize:[38,38], iconAnchor:[19,38], popupAnchor:[0,-32],
        });
        const m = L.marker([h.lat, h.lng], { icon:ic });
        m.bindPopup(`<b>${h.t}</b>📍 ${h.loc}<br/><span style="color:#888">${h.ago||"reciente"} · ${h.confirmed||1} confirmaciones</span><br/><span class="open-btn" onclick="window._openHazards()">Ver alertas</span>`);
        add(m);
      });
    }
    // Veterinarias
    if(filter==="all"){
      VET_MARKERS.forEach(v => {
        const ic = L.divIcon({
          className:"", html:`<div class="vet-marker">${v.ic}</div>`,
          iconSize:[38,38], iconAnchor:[19,38], popupAnchor:[0,-32],
        });
        const m = L.marker([v.lat, v.lng], { icon:ic });
        m.bindPopup(`<b>${v.name}</b>Veterinaria aliada<br/><span class="open-btn" onclick="window._openVets()">Ver descuentos</span>`);
        add(m);
      });
    }
  };
  window._openDog = (id) => go("dogDetail",{id});
  window._openHazards = () => go("hazards");
  window._openVets = () => go("vetDiscounts");

  renderMarkers("all");
  setTimeout(()=>lmap.invalidateSize(), 100);

  $("#recenter").onclick = ()=>{
    if(navigator.geolocation){
      navigator.geolocation.getCurrentPosition(
        p => { lmap.setView([p.coords.latitude, p.coords.longitude], 15); toast("📍 Centrado en tu ubicación"); },
        () => { lmap.setView(userCoords, 14); toast("📍 Centrado en " + userDistrict); }
      );
    } else { lmap.setView(userCoords, 14); }
  };

  $$(".card[data-id]", view).forEach(c=>c.onclick=()=>go("dogDetail",{id:c.dataset.id}));
  $$(".map-chips .chip", view).forEach(c => c.onclick = ()=>{
    $$(".map-chips .chip", view).forEach(x=>x.classList.remove("active"));
    c.classList.add("active");
    renderMarkers(c.dataset.f);
    toast("Filtro: " + c.textContent.trim());
  });
  $("#fab").onclick = ()=>{
    if(role==="ciudadano") go("report");
    else if(role==="adoptante") go("evidence");
    else if(role==="admin") go("adminPanel");
    else go("publish1");
  };
}

  hideNav(); view.classList.remove("dark");
  const stepBar = `
    <div class="stepbar">
      <div class="step ${step>=1?'on':''}">1</div>
      <div class="line ${step>=2?'on':''}"></div>
      <div class="step ${step>=2?'on':''}">2</div>
      <div class="line ${step>=3?'on':''}"></div>
      <div class="step ${step>=3?'on':''}">3</div>
    </div>`;
  let body = "";
  if(step===1){
    body = `
      <div class="label">Información del perro</div>
      <div class="upload" id="pubUp"><span class="ic">📷</span>Agregar fotos (máx. 5)</div>
      <div class="label">Nombre</div>
      <input class="input" placeholder="Ej. Max"/>
      <div class="row mt8">
        <div><div class="label mt0">Edad</div><select class="select"><option>Cachorro</option><option>2 años</option><option>Adulto</option></select></div>
        <div><div class="label mt0">Sexo</div><select class="select"><option>Macho</option><option>Hembra</option></select></div>
      </div>
      <div class="row mt8">
        <div><div class="label mt0">Tamaño</div><select class="select"><option>Pequeño</option><option>Mediano</option><option>Grande</option></select></div>
        <div><div class="label mt0">Raza</div><select class="select"><option>Mestizo</option><option>Labrador</option><option>Pastor Alemán</option></select></div>
      </div>
      <div class="mt16"></div>
      <button class="btn" id="next">Siguiente</button>`;
  } else if(step===2){
    body = `
      <div class="label">Estado de salud</div>
      <select class="select"><option>Saludable</option><option>Herido</option><option>En tratamiento</option></select>
      <div class="label">Vacunas</div>
      <select class="select"><option>Al día</option><option>Pendientes</option></select>
      <div class="label">Esterilizado</div>
      <select class="select"><option>Sí</option><option>No</option></select>
      <div class="label">Descripción</div>
      <textarea class="textarea" placeholder="Max es un perrito cariñoso... (0/200)" maxlength="200"></textarea>
      <div class="row mt8">
        <div><div class="label mt0">Publicado por</div><select class="select"><option>Albergue</option><option>Rescatista temporal</option></select></div>
        <div><div class="label mt0">Distrito</div><select class="select"><option>Jesús María</option><option>Miraflores</option><option>San Isidro</option></select></div>
      </div>
      <div class="mt16"></div>
      <button class="btn" id="next">Siguiente</button>`;
  } else {
    body = `
      <div class="card"><div class="avatar">🐕</div><div class="meta">
        <p class="t">Max <span class="badge ok">✓ Verificado</span></p>
        <p class="s">Macho · 2 años · Mediano</p>
      </div></div>
      <h3 class="section">Resumen</h3>
      <p class="sub">Max es un perro cariñoso, juguetón y muy noble. Se lleva bien con personas y otros perros.</p>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <span class="chip">Saludable</span><span class="chip">Vacunado</span><span class="chip">No esterilizado</span>
      </div>
      <div class="label mt16">Confirmación</div>
      <div class="filter-row"><input type="checkbox" checked id="ack"/><label for="ack">Confirmo que toda la información es verídica.</label></div>
      <div class="mt16"></div>
      <button class="btn" id="next">Publicar</button>`;
  }
  view.innerHTML = `
    <div class="top-app-bar"><div class="left"><button class="back" id="b">←</button> Publicar en adopción</div></div>
    <div class="pad"><p class="sub">Paso ${step} de 3</p>${stepBar}${body}</div>`;
  $("#b").onclick = back;
  if(step===1) attachUploader("#pubUp", { max:5, placeholder:"<span class='ic'>📷</span>Agregar fotos (máx. 5)" });
  $("#next").onclick = async ()=>{
    if(step<3) go("publish"+(step+1));
    else {
      const u = currentUser();
      const [lat, lng] = DISTRICT_COORDS[u.district] || DISTRICT_COORDS["Lima"];
      const jitter = () => (Math.random()-0.5) * 0.012;
      await store.addDog({
        name: "Nuevo perro " + Math.floor(Math.random()*900+100),
        lat: lat + jitter(), lng: lng + jitter(),
        district: u.district,
        status: "En adopción",
        age: "2 años", sex: "Macho", size: "Mediano",
        health: ["Saludable","Vacunado"],
        img: ["🐕","🐩","🐶","🐕‍🦺"][Math.floor(Math.random()*4)],
        desc: "Publicado por " + u.name,
        reportedAt: "recién publicado",
        location: u.district,
        caseId: "#" + Math.floor(3000+Math.random()*999),
        verified: u.role === "albergue",
        publishedBy: u.name,
      });
      toast("Publicación exitosa · El perro está en adopción 🐶");
      go("activity");
    }
  };
}

/* ============= Chat ============= */
function scrChat({name="Albergue Patitas Felices", dog="Max"}={}){
  hideNav(); view.classList.remove("dark");
  view.innerHTML = `
    <div class="top-app-bar">
      <div class="left">
        <button class="back" id="b">←</button>
        <div style="width:36px;height:36px;border-radius:50%;background:#f1efeb;display:flex;align-items:center;justify-content:center;font-size:16px">🏠</div>
        <div><div style="font-size:14px">${name}</div><div class="small">En línea</div></div>
      </div>
      <div class="right"><button class="icon-btn">⋮</button></div>
    </div>
    <div class="chat-context">Hola, hemos recibido tu solicitud por ${dog}.</div>
    <div class="chat-msgs" id="msgs">
      <div class="bubble in">Hola, claro, gracias por contactarnos.<span class="ts">10:32 a.m.</span></div>
      <div class="bubble out">¡Hola! Sí, me interesa mucho ${dog}.<span class="ts">10:33 a.m.</span></div>
      <div class="bubble in">Con gusto, ¿podemos agendar una visita?<span class="ts">10:33 a.m.</span></div>
      <div class="bubble out">Sí, ¿qué día les queda mejor?<span class="ts">10:34 a.m.</span></div>
      <div class="bubble in">¿El sábado a las 10am? Te envío los detalles.<span class="ts">10:34 a.m.</span></div>
    </div>
    <div class="chat-bar">
      <input id="msg" placeholder="Escribe un mensaje..."/>
      <button id="send">➤</button>
    </div>`;
  $("#b").onclick = back;
  const send = ()=>{
    const v = $("#msg").value.trim(); if(!v) return;
    const m = document.createElement("div");
    m.className = "bubble out";
    m.innerHTML = `${v}<span class="ts">ahora</span>`;
    $("#msgs").appendChild(m);
    $("#msg").value = "";
    $("#msgs").scrollTop = $("#msgs").scrollHeight;
    setTimeout(()=>{
      const r = document.createElement("div");
      r.className = "bubble in";
      r.innerHTML = `¡Perfecto! Te confirmo en unos minutos.<span class="ts">ahora</span>`;
      $("#msgs").appendChild(r);
      $("#msgs").scrollTop = $("#msgs").scrollHeight;
    }, 900);
  };
  $("#send").onclick = send;
  $("#msg").addEventListener("keydown", e=> { if(e.key==="Enter") send(); });
}

      <div class="s"><div class="n">${Math.floor(u.points/40)}</div><div class="l">Reportes</div></div>
      <div class="s"><div class="n">${Math.floor(u.points/120)}</div><div class="l">Solicitudes</div></div>
      <div class="s"><div class="n">${Math.floor(u.points/400)}</div><div class="l">Adopciones</div></div>
      <div class="s"><div class="n">${u.points}</div><div class="l">PawPoints</div></div>
    </div>
    <div class="pad">
      ${u.role==="admin" ? '<div class="row-link" data-act="adminPanel"><div class="lt"><div class="ic" style="background:#fff3b0;color:#8a5a00">👑</div>Panel de Administración</div><div class="rt"><span class="badge new">Admin</span> ›</div></div>' : ''}
      <div class="row-link" data-act="settings"><div class="lt"><div class="ic">👤</div>Mis datos</div><div class="rt">›</div></div>
      <div class="row-link" data-act="points"><div class="lt"><div class="ic">🏆</div>Mis PawPoints</div><div class="rt">›</div></div>
      <div class="row-link" data-act="vetDiscounts"><div class="lt"><div class="ic">🏥</div>Descuentos en veterinarias</div><div class="rt">›</div></div>
      <div class="row-link" data-act="certifs"><div class="lt"><div class="ic">📜</div>Certificaciones de Voluntariado</div><div class="rt"><span class="badge new">Nuevo</span> ›</div></div>
      <div class="row-link" data-act="tips"><div class="lt"><div class="ic">💡</div>Consejos para rescatistas</div><div class="rt">›</div></div>
      <div class="row-link" data-act="hazards"><div class="lt"><div class="ic">⚠️</div>Peligros en la zona</div><div class="rt">›</div></div>
      <div class="row-link" data-act="help"><div class="lt"><div class="ic">❓</div>Ayuda</div><div class="rt">›</div></div>
      <div class="row-link" data-act="logout" style="color:#a52a1d"><div class="lt"><div class="ic" style="background:#fde7e4;color:#a52a1d">↩</div>Cerrar sesión</div></div>
    </div>`;
  $$("[data-act]", view).forEach(r=>r.onclick = ()=>{
    const a = r.dataset.act;
    if(a==="logout"){ logout(); return; }
    if(a==="help"){ toast("Centro de ayuda · demo"); return; }
    go(a);
  });
}

function scrSettings(){
  hideNav(); view.classList.remove("dark");
  const u = currentUser();
  view.innerHTML = `
    <div class="top-app-bar"><div class="left"><button class="back" id="b">←</button> Mis datos</div></div>
    <div class="pad">
      <div class="label">Nombre</div><input class="input" id="n" value="${u.name}"/>
      <div class="label">Correo</div><input class="input" id="e" value="${u.email}" readonly/>
      <div class="label">Distrito</div>
      <select class="select" id="d">
        ${["Jesús María","Miraflores","Barranco","San Isidro","Surco","San Borja","Pueblo Libre","Lince","Surquillo"].map(x=>`<option ${x===u.district?'selected':''}>${x}</option>`).join("")}
      </select>
      <div class="label">Contraseña actual</div><input class="input" type="password" placeholder="••••••••"/>
      <div class="mt16"></div>
      <button class="btn" id="save">Guardar cambios</button>
    </div>`;
  $("#b").onclick = back;
  $("#save").onclick = ()=>{ updateUser({name:$("#n").value, district:$("#d").value}); toast("Datos actualizados"); back(); };
}

/* ============= TIPS (Consejos) ============= */
function scrTips(){
  if(!currentUser()) return go("login");
  showNav("tips"); view.classList.remove("dark");
  view.innerHTML = `
    <div class="top-app-bar"><div class="left">💡 Consejos</div></div>
    <div class="tip-hero">
      <div class="ic">🐾</div>
      <div><p class="t">Salva vidas con información correcta</p><p class="s">Aprende a actuar antes de acercarte a un perro</p></div>
    </div>
    <div class="pad" style="padding-top:6px">
      <div class="card" data-cat="seguridad" style="cursor:pointer">
        <div class="avatar" style="background:#fde7e4;color:#a52a1d">⚠️</div>
        <div class="meta"><p class="t">Seguridad al rescatar</p><p class="s">5 consejos · cómo acercarte sin riesgo</p></div>
        <span style="color:#bbb">›</span>
      </div>
      <div class="card mt8" data-cat="adopcion" style="cursor:pointer">
        <div class="avatar" style="background:#defaee;color:#147346">❤️</div>
        <div class="meta"><p class="t">Antes y después de adoptar</p><p class="s">8 consejos · adopción responsable</p></div>
        <span style="color:#bbb">›</span>
      </div>

      <h3 class="section">Datos que ayudan a más adopciones</h3>
      <div class="tip-card good">
        <div class="head"><div class="ic">📊</div><div class="t">Solo el 30% de perros adultos son adoptados</div></div>
        <div class="body">Compartir publicaciones de perros adultos triplica sus chances de encontrar hogar. <b>Comparte un perfil hoy.</b></div>
      </div>
      <div class="tip-card info">
        <div class="head"><div class="ic">🌟</div><div class="t">Un perro adoptado salva indirectamente a otro</div></div>
        <div class="body">Cada adopción libera un cupo en el albergue para rescatar a otro perro en la calle. Tu acción multiplica el impacto.</div>
      </div>
      <div class="tip-card tip">
        <div class="head"><div class="ic">📸</div><div class="t">Difunde con responsabilidad</div></div>
        <div class="body">Tomar buenas fotos (luz natural, mirada amistosa) aumenta las solicitudes de adopción hasta en un 60%. Si conoces un albergue, ofrécele tu ayuda.</div>
      </div>
    </div>`;
  $$("[data-cat]", view).forEach(c=>c.onclick = ()=> go("tipsList",{cat:c.dataset.cat}));
}

function scrTipsList({cat}){
  hideNav(); view.classList.remove("dark");
  const titles = {seguridad:"Seguridad al rescatar", adopcion:"Adopción responsable"};
  const items = TIPS[cat] || [];
  view.innerHTML = `
    <div class="top-app-bar"><div class="left"><button class="back" id="b">←</button> ${titles[cat]}</div></div>
    <div class="pad">
      ${items.map(t=>`
        <div class="tip-card ${t.kind}">
          <div class="head"><div class="ic">${t.ic}</div><div class="t">${t.t}</div></div>
          <div class="body">${t.body}</div>
        </div>`).join("")}
      <div class="small center mt12">— Recuerda: ante emergencias llama al 105 (Serenazgo) —</div>
    </div>`;
  $("#b").onclick = back;
}

/* ============= HAZARDS (Peligros en la zona) ============= */
function scrHazards(){
  if(!currentUser()) return go("login");
  hideNav(); view.classList.remove("dark");
  view.innerHTML = `
    <div class="top-app-bar">
      <div class="left"><button class="back" id="b">←</button> Peligros en la zona</div>
      <div class="right"><button class="icon-btn" id="add">＋</button></div>
    </div>
    <div class="hazard-banner">
      <div class="ic">⚠️</div>
      <div style="flex:1"><div class="t">${HAZARDS.length} alertas activas cerca de ti</div><div class="s">Reporta para proteger a la comunidad — estilo Waze</div></div>
    </div>
    <div class="pad" style="padding-top:8px">
      ${HAZARDS.map((h,i)=>`
        <div class="hazard-item">
          <div class="row1">
            <div class="ic ${h.sev==='crit'?'crit':h.sev==='med'?'med':'info'}">${h.ic}</div>
            <div class="info">
              <p class="t">${h.t}</p>
              <p class="loc">📍 ${h.loc}</p>
            </div>
            <span class="badge ${h.sev==='crit'?'no':h.sev==='med'?'warn':'info'}">${h.sev==='crit'?'Crítico':h.sev==='med'?'Medio':'Aviso'}</span>
          </div>
          <div class="meta-row">
            <span>${h.ago||"reciente"} · ${h.confirmed||1} confirmaciones</span>
            <div class="actions">
              <button class="up" data-act="up" data-id="${h.id||''}">👍 Confirmar</button>
              <button data-act="down" data-id="${h.id||''}">👎</button>
            </div>
          </div>
        </div>`).join("")}
    </div>`;
  $("#b").onclick = back;
  $("#add").onclick = ()=> go("reportHazard");
  $$("[data-act]", view).forEach(b => b.onclick = async ()=>{
    if(b.dataset.act==="up"){
      const id = b.dataset.id;
      if(id) await store.confirmHazard(id);
      const u=currentUser(); updateUser({points:u.points+5});
      toast("Confirmaste el peligro · +5 pts");
    } else toast("Reporte descartado");
  });
}

function scrReportHazard(){
  hideNav(); view.classList.remove("dark");
  view.innerHTML = `
    <div class="top-app-bar"><div class="left"><button class="back" id="b">←</button> Reportar peligro</div></div>
    <div class="pad">
      <p class="sub">Alerta a otros usuarios sobre situaciones peligrosas para perros en tu zona.</p>

      <div class="label">Tipo de peligro (relacionado a perros)</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap" id="kind">
        <span class="chip active">🐕‍🦺 Perros sueltos / jauría</span>
        <span class="chip">☣️ Síntomas de rabia · espuma</span>
        <span class="chip">🐶 Sarna o piel afectada</span>
        <span class="chip">🦠 Moquillo / parvovirus</span>
        <span class="chip">☠️ Veneno o trampa</span>
        <span class="chip">🚛 Captura ilegal</span>
        <span class="chip">🚨 Maltrato animal</span>
        <span class="chip">🚗 Atropellos frecuentes</span>
        <span class="chip">🐾 Cachorros abandonados</span>
      </div>

      <h3 class="section">Ubicación</h3>
      <div class="card"><div class="avatar">📍</div><div class="meta"><p class="t">Av. Brasil, Jesús María</p><p class="s">Detectada automáticamente · puedes ajustarla</p></div></div>

      <div class="label">Gravedad</div>
      <div style="display:flex;gap:6px" id="sev">
        <span class="chip">Aviso</span>
        <span class="chip active">Medio</span>
        <span class="chip">Crítico</span>
      </div>

      <div class="label">Descripción (opcional)</div>
      <textarea class="textarea" placeholder="Ej. Varios atropellos esta semana cerca a la cuadra 25..."></textarea>

      <div class="upload mt12" id="hzUp"><span class="ic">📷</span>Foto del lugar (opcional)</div>

      <div class="mt16"></div>
      <button class="btn" id="send">Publicar alerta</button>
    </div>`;
  $("#b").onclick = back;
  attachUploader("#hzUp", { max:3, placeholder:"<span class='ic'>📷</span>Foto del lugar (opcional)" });
  $$("#kind .chip", view).forEach(c=>c.onclick = ()=>{ $$("#kind .chip", view).forEach(x=>x.classList.remove("active")); c.classList.add("active");});
  $$("#sev .chip", view).forEach(c=>c.onclick = ()=>{ $$("#sev .chip", view).forEach(x=>x.classList.remove("active")); c.classList.add("active");});
  $("#send").onclick = async ()=>{
    const kindTxt = $("#kind .chip.active", view)?.textContent.trim() || "🐕 Perros sueltos";
    const sevTxt  = $("#sev .chip.active",  view)?.textContent.trim() || "Medio";
    const desc    = $(".textarea", view).value || "";
    const ic = (kindTxt.match(/^\S+/) || ["⚠️"])[0];
    const t  = kindTxt.replace(ic, "").trim();
    const sev = sevTxt === "Crítico" ? "crit" : sevTxt === "Aviso" ? "info" : "med";
    const u = currentUser();
    const [lat, lng] = DISTRICT_COORDS[u.district] || DISTRICT_COORDS["Lima"];
    const jitter = () => (Math.random()-0.5) * 0.012;
    await store.addHazard({
      sev, ic, t,
      lat: lat + jitter(), lng: lng + jitter(),
      loc: (u.district || "Lima") + (desc ? " · " + desc.slice(0,50) : ""),
      ago: "recién reportado", reports: 1, confirmed: 1,
      reportedBy: u.name,
    });
    updateUser({points:u.points+15});
    toast("Alerta publicada · +15 pts");
    go("hazards");
  };
}

/* ----------------- Boot ----------------- */
function tick(){
  const d = new Date();
  $("#clock").textContent = d.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});
}
setInterval(tick, 30000); tick();

async function boot(){
  initFirebase();
  if(fbReady){
    try{ await seedIfEmpty(); }catch(e){ console.error("seed error", e); }
    setupLiveSync();
  }
  if(state.session && currentUser()){
    state.history = [{screen:"map"}];
    go("map", {}, false);
  } else {
    go("login");
  }
}
boot();
</script>
</body>
</html>
